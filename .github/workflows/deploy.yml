name: Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OPTIONAL: only needed if you build (Node, React, etc.)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # OPTIONAL: install & build
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Upload static files (change folder if needed)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # 🔥 change this if needed

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
